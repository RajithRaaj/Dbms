<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Auto Vault</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
}

.card {
  background: #1f2937;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🚗 Apex Auto Vault</h1>

<input id="name" placeholder="Car Name">
<input id="brand" placeholder="Brand">
<input id="price" placeholder="Price">
<button onclick="addCar()">Add Car</button>

<div id="cars"></div>

<script>
// ✅ YOUR REAL PROJECT URL
const supabase = window.supabase.createClient(
  "https://cuwvqchmcyyltfdlytjn.supabase.co",
  "YOUR_ANON_KEY"
);

// LOAD CARS
async function loadCars() {
  const { data, error } = await supabase
    .from("Cars")   // ⚠️ match your table name EXACTLY
    .select("*");

  console.log("DATA:", data, "ERROR:", error);

  const container = document.getElementById("cars");
  container.innerHTML = "";

  if (data) {
    data.forEach(car => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <b>${car.name}</b><br>
        ${car.brand}<br>
        $${car.price}
      `;
      container.appendChild(div);
    });
  }
}

// ADD CAR
async function addCar() {
  const name = document.getElementById("name").value;
  const brand = document.getElementById("brand").value;
  const price = document.getElementById("price").value;

  const { error } = await supabase
    .from("Cars")
    .insert([{ name, brand, price }]);

  if (error) {
    alert("Error: " + error.message);
  }

  loadCars();
}

// INIT
loadCars();
</script>

</body>
</html>
